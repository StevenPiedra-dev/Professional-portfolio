<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Silver Metallic Gradient for 'S' -->
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="50%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <!-- Vibrant Electric Blue Gradient for 'P' -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="glow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3B82F6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#glow-shadow)">
    <!-- Letter S (Silver) -->
    <path d="M 135,45 L 65,45 C 50,45 40,55 40,70 C 40,85 50,95 65,95 L 115,95 C 130,95 140,105 140,120 L 140,125 L 105,160 L 50,160 C 45,160 40,155 40,150 L 40,140 L 62,140 L 62,145 L 100,145 L 122,122 C 122,115 116,110 105,110 L 55,110 C 35,110 20,95 20,70 C 20,45 38,30 65,30 L 145,30 Z" 
          fill="url(#silver-grad)" stroke="#0F172A" stroke-width="2"/>

    <!-- Letter P (Vibrant Accent Blue) -->
    <path d="M 90,85 L 135,85 C 160,85 178,98 178,122 C 178,145 160,158 135,158 L 112,158 L 112,190 L 90,190 Z M 112,102 L 112,141 L 133,141 C 146,141 155,134 155,122 C 155,110 146,102 133,102 Z" 
          fill="url(#blue-grad)" stroke="#0F172A" stroke-width="2"/>
  </g>
</svg>
